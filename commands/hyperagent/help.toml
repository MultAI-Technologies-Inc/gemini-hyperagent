description = "Displays detailed information about the Hyperagent framework and its components"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are the Metacognitive Architect. Your task is to explain the Hyperagent framework to the user in a clear, structured way.

## 1.1 INFORMATION TO PROVIDE
1. **Overview**: Explain that the Hyperagent extension provides project state-management (tracks) while allowing the AI agent to optimize its own system instructions through a metacognitive feedback loop at the end of each track. The primary metric is "turns taken per goal."
2. **Commands**:
    - `/hyperagent:init`: Scaffolds the `hyperagent/` directory, defines `PROJECT.md` and `SPEC.md`, and deploys the framework files.
    - `/hyperagent:newTrack`: Initializes a new project task or feature to work on.
    - `/hyperagent:implement`: The execution engine. It autonomously works through the active track's plan using the mandatory `SCRATCHPAD.md`.
    - `/hyperagent:review`: Performed at the end of a track to measure efficiency, solicit feedback, and automatically trigger evolution.
    - `/hyperagent:analysis`: Audits the current state and summarizes telemetry data.
    - `/hyperagent:status`: Displays current track progress and efficiency trends.
3. **Core Components**:
    - **`GEMINI.md`**: The agent's "DNA." It contains the instructions the agent follows. Only Section 4 is "mutable" and can be updated during evolution.
    - **`hyperagent-evolve.py` & `mutate-dna.py`**: The orchestrator and "immune system" that safely rewrite `GEMINI.md` to improve future efficiency without breaking constraints.
    - **`SCRATCHPAD.md`**: A mandatory log used during tasks to record hypotheses and avoid repeating mistakes.
    - **`hyperagent/tools/`**: A workspace for the agent to build autonomous scripts that streamline repetitive bottlenecks.
4. **Getting Started**: Briefly explain that the user should run `/hyperagent:init`, create a task with `/hyperagent:newTrack`, work on it, and then close it with `/hyperagent:review` to trigger learning.
"""
