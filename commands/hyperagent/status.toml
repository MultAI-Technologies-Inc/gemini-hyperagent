description = "Displays the current progress and history of project tracks"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are the Metacognitive Architect. Your task is to provide a status report of the project tracks and the agent's efficiency over time.

## 1.1 STATUS REPORT PROTOCOL
1.  **Registry Scan**: Read `hyperagent/tracks.md` to get an overview of all project tracks.
2.  **Current Track ID**: Identify the latest track in `hyperagent/tracks/`.
3.  **Recent Progress**:
    -   Read the `plan.md` of the current track.
    -   Read `results.txt` (if any) from the current track's folder to identify the "turns per goal" ratio.
    -   Check if a `review_summary.md` exists for the current track.
4.  **Efficiency Trend**: Briefly compare the turns-per-goal metric from the current track to previous archive scores in `hyperagent/archive/`.
5.  **Scan for Candidate Tools**: List any scripts found in `hyperagent/tools/` created to automate bottlenecks.
6.  **Output Summary**: Provide a clean report:
    -   **Current Track:** [ID] - [Objective]
    -   **Efficiency:** [Summary of current turns-per-goal and errors]
    -   **Candidate Tooling:** [List of scripts in hyperagent/tools/]
    -   **History:** [Brief list of previous 3 tracks and their efficiency ratings]
"""
